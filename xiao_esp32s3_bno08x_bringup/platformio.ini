[platformio]
default_envs = xiao_esp32s3

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 921600
monitor_filters = direct
lib_deps =
    adafruit/Adafruit BNO08x@1.2.5
build_flags =
    -D CORE_DEBUG_LEVEL=0

; PC-only Euler conversion tests.  This environment intentionally builds only
; attitude_math.cpp; it does not emulate Arduino or an I2C device.
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<attitude_math.cpp>
build_flags =
    -I include
